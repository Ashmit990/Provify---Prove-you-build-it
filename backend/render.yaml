services:
  - type: web
    name: provify-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter        # Starter plan required for persistent disk
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: CHROMA_BASE_DIR
        value: /data/chroma
      - key: REDIS_URL
        fromService:
          type: redis
          name: provify-redis
          property: connectionString
      # Fill these in via Render dashboard or environment groups:
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: provify
      - key: LANGCHAIN_TRACING_V2
        value: "true"
    disk:
      name: chroma-data
      mountPath: /data/chroma
      sizeGB: 5

  - type: redis
    name: provify-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
